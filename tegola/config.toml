[webserver]
port = ":8080"

  [webserver.headers]
  Access-Control-Allow-Origin = "*"
  Access-Control-Allow-Methods = "GET, OPTIONS"
  Cache-Control = "public, max-age=3600, stale-while-revalidate=600"

# Tegola internal Redis cache — DISABLED for near-realtime QGIS → dashboard propagation.
# With 1-3 active campaigns and low traffic, Tegola can query PostGIS directly on each
# tile request. Caching is handled by Nginx (30s disk cache) and browser (Cache-Control).
# [cache]
# type = "redis"
# uri = "redis://:${REDIS_PASSWORD}@redis:6379/0"
# max_zoom = 14

[[providers]]
name = "neon"
type = "mvt_postgis"
uri = "${DATABASE_URL}"

  # ── Base map layers ──
  # Use geom_3857 column (pre-projected, GIST-indexed) to avoid on-the-fly ST_Transform.
  # ST_SimplifyPreserveTopology reduces vertex count at low zooms (2-5x smaller tiles).
  # Tolerance is in EPSG:3857 meters: ~5000m at z3-7, ~1000m at z8-9, full detail at z10+.

  [[providers.layers]]
  name = "departamentos"
  geometry_type = "MultiPolygon"
  id_fieldname = "gid"
  sql = "SELECT gid, coddep, nomdep AS departamento, ST_AsMVTGeom(CASE WHEN !ZOOM! < 8 THEN ST_SimplifyPreserveTopology(geom_3857, 5000) WHEN !ZOOM! < 10 THEN ST_SimplifyPreserveTopology(geom_3857, 1000) ELSE geom_3857 END, !BBOX!) AS geom FROM public.peru_departamentos WHERE geom_3857 && !BBOX!"

  [[providers.layers]]
  name = "provincias"
  geometry_type = "MultiPolygon"
  id_fieldname = "gid"
  sql = "SELECT gid, coddep, codprov, (coddep || codprov) AS codprov_full, nomprov AS provincia, ST_AsMVTGeom(CASE WHEN !ZOOM! < 8 THEN ST_SimplifyPreserveTopology(geom_3857, 3000) WHEN !ZOOM! < 10 THEN ST_SimplifyPreserveTopology(geom_3857, 800) ELSE geom_3857 END, !BBOX!) AS geom FROM public.peru_provincias WHERE geom_3857 && !BBOX!"

  [[providers.layers]]
  name = "distritos"
  geometry_type = "MultiPolygon"
  id_fieldname = "gid"
  sql = "SELECT gid, ubigeo, coddep, codprov, (coddep || codprov) AS codprov_full, right(ubigeo, 2) AS coddist, nomdist AS distrito, ST_AsMVTGeom(CASE WHEN !ZOOM! < 10 THEN ST_SimplifyPreserveTopology(geom_3857, 500) WHEN !ZOOM! < 12 THEN ST_SimplifyPreserveTopology(geom_3857, 100) ELSE geom_3857 END, !BBOX!) AS geom FROM public.peru_distritos WHERE geom_3857 && !BBOX!"

  # ── Priority zones: base map JOINed with campaign_priority_zones ──

  [[providers.layers]]
  name = "priority_departamentos"
  geometry_type = "MultiPolygon"
  id_fieldname = "gid"
  sql = "SELECT d.gid, d.coddep, d.nomdep AS departamento, cpz.campaign_id::text, cpz.priority, ST_AsMVTGeom(d.geom_3857, !BBOX!) AS geom FROM public.peru_departamentos d INNER JOIN public.campaign_priority_zones cpz ON cpz.zone_code = d.coddep AND cpz.zone_level = 'departamento' WHERE d.geom_3857 && !BBOX!"

  [[providers.layers]]
  name = "priority_provincias"
  geometry_type = "MultiPolygon"
  id_fieldname = "gid"
  sql = "SELECT p.gid, p.coddep, p.codprov, (p.coddep || p.codprov) AS codprov_full, p.nomprov AS provincia, cpz.campaign_id::text, cpz.priority, ST_AsMVTGeom(p.geom_3857, !BBOX!) AS geom FROM public.peru_provincias p INNER JOIN public.campaign_priority_zones cpz ON cpz.zone_code = (p.coddep || p.codprov) AND cpz.zone_level = 'provincia' WHERE p.geom_3857 && !BBOX!"

  [[providers.layers]]
  name = "priority_distritos"
  geometry_type = "MultiPolygon"
  id_fieldname = "gid"
  sql = "SELECT d.gid, d.ubigeo, d.coddep, d.codprov, (d.coddep || d.codprov) AS codprov_full, right(d.ubigeo, 2) AS coddist, d.nomdist AS distrito, cpz.campaign_id::text, cpz.priority, ST_AsMVTGeom(d.geom_3857, !BBOX!) AS geom FROM public.peru_distritos d INNER JOIN public.campaign_priority_zones cpz ON cpz.zone_code = d.ubigeo AND cpz.zone_level = 'distrito' WHERE d.geom_3857 && !BBOX!"

  # ── Campaign custom zones: sectors/subsectors with own geometry ──
  # geom_3857 column + trigger added in migration 025_ccz_geom_3857.sql

  [[providers.layers]]
  name = "campaign_sectors"
  geometry_type = "MultiPolygon"
  id_fieldname = "id"
  sql = "SELECT id, campaign_id::text, zone_level, zone_code, zone_name, sector, subsector, parent_code, population, ST_AsMVTGeom(geom_3857, !BBOX!) AS geom FROM public.campaign_custom_zones WHERE geom_3857 && !BBOX!"

  # ── Brigadista locations: QGIS-managed point markers ──
  # 4 layers split by agent_role × location_type for distinct styling on the dashboard.
  # geom_3857 auto-projected via trigger in migration 032_brigadista_locations.sql

  [[providers.layers]]
  name = "brigadista_domicilio_campo"
  geometry_type = "Point"
  id_fieldname = "id"
  sql = "SELECT id, campaign_id::text, agent_name, notes, ST_AsMVTGeom(geom_3857, !BBOX!) AS geom FROM public.brigadista_locations WHERE agent_role = 'agente_campo' AND location_type = 'domicilio' AND geom_3857 && !BBOX!"

  [[providers.layers]]
  name = "brigadista_trabajo_campo"
  geometry_type = "Point"
  id_fieldname = "id"
  sql = "SELECT id, campaign_id::text, agent_name, notes, ST_AsMVTGeom(geom_3857, !BBOX!) AS geom FROM public.brigadista_locations WHERE agent_role = 'agente_campo' AND location_type = 'centro_trabajo' AND geom_3857 && !BBOX!"

  [[providers.layers]]
  name = "brigadista_domicilio_digital"
  geometry_type = "Point"
  id_fieldname = "id"
  sql = "SELECT id, campaign_id::text, agent_name, notes, ST_AsMVTGeom(geom_3857, !BBOX!) AS geom FROM public.brigadista_locations WHERE agent_role = 'agente_digital' AND location_type = 'domicilio' AND geom_3857 && !BBOX!"

  [[providers.layers]]
  name = "brigadista_trabajo_digital"
  geometry_type = "Point"
  id_fieldname = "id"
  sql = "SELECT id, campaign_id::text, agent_name, notes, ST_AsMVTGeom(geom_3857, !BBOX!) AS geom FROM public.brigadista_locations WHERE agent_role = 'agente_digital' AND location_type = 'centro_trabajo' AND geom_3857 && !BBOX!"

[[maps]]
name = "peru"
center = [-75.0152, -9.1899, 5.0]

  [[maps.layers]]
  provider_layer = "neon.departamentos"
  min_zoom = 3
  max_zoom = 14

  [[maps.layers]]
  provider_layer = "neon.provincias"
  min_zoom = 5
  max_zoom = 14

  [[maps.layers]]
  provider_layer = "neon.distritos"
  min_zoom = 8
  max_zoom = 14

  # Priority zones overlays
  [[maps.layers]]
  provider_layer = "neon.priority_departamentos"
  min_zoom = 3
  max_zoom = 14

  [[maps.layers]]
  provider_layer = "neon.priority_provincias"
  min_zoom = 5
  max_zoom = 14

  [[maps.layers]]
  provider_layer = "neon.priority_distritos"
  min_zoom = 8
  max_zoom = 14

  # Campaign custom zones (sectors/subsectors)
  [[maps.layers]]
  provider_layer = "neon.campaign_sectors"
  min_zoom = 10
  max_zoom = 14

  # Brigadista location points (QGIS-managed)
  [[maps.layers]]
  provider_layer = "neon.brigadista_domicilio_campo"
  min_zoom = 8
  max_zoom = 14

  [[maps.layers]]
  provider_layer = "neon.brigadista_trabajo_campo"
  min_zoom = 8
  max_zoom = 14

  [[maps.layers]]
  provider_layer = "neon.brigadista_domicilio_digital"
  min_zoom = 8
  max_zoom = 14

  [[maps.layers]]
  provider_layer = "neon.brigadista_trabajo_digital"
  min_zoom = 8
  max_zoom = 14
