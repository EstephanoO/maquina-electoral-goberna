<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/goberna-logo.png" />
    <link rel="apple-touch-icon" href="/goberna-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Goberna Leads" />
    <meta name="description" content="CRM de ventas potenciado con WhatsApp" />
    <title>GOBERNA LEADS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Mantenemos el register del SW solo para que el tombstone /sw.js corra
      // en browsers de users que ya tenían la versión vieja registrada — el
      // tombstone se desregistra a sí mismo en el activate. Una vez que todos
      // los users hayan pasado por acá, este script se puede eliminar
      // (y borrar /sw.js + /manifest.json del bundle).
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      }
    </script>
  </body>
</html>
