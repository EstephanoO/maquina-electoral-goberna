# Local dev database only. Production compose lives at repo root.
name: nexus-leads-dev

services:
  db:
    image: postgres:16-alpine
    container_name: nexus_leads_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev
      POSTGRES_DB: nexus_leads
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_leads"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
