name: Frontend CI CD

on:
  pull_request:
    paths:
      - "nexus-web/**"
      - "NUEVO_CONTRATO_EXPO.md"
      - "scripts/ci/check_architecture_contracts.py"
      - ".github/workflows/frontend-ci-cd.yml"
  push:
    branches:
      - main
    paths:
      - "nexus-web/**"
      - "NUEVO_CONTRATO_EXPO.md"
      - "scripts/ci/check_architecture_contracts.py"
      - ".github/workflows/frontend-ci-cd.yml"

concurrency:
  group: frontend-main
  cancel-in-progress: true

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: nexus-web

      - name: Typecheck and build frontend
        run: |
          bunx tsc --noEmit
          bun run build
        working-directory: nexus-web

      - name: Enforce architecture contracts
        run: python3 scripts/ci/check_architecture_contracts.py

  frontend-production-health:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - frontend-quality
    runs-on: ubuntu-latest
    steps:
      - name: Verify production URL is healthy
        env:
          FRONTEND_PROD_URL: ${{ secrets.FRONTEND_PROD_URL }}
        run: |
          set -euo pipefail
          if [ -z "${FRONTEND_PROD_URL:-}" ]; then
            echo "FRONTEND_PROD_URL no definido, se omite health check"
            exit 0
          fi
          for attempt in $(seq 1 20); do
            if curl -fsS "${FRONTEND_PROD_URL}/" >/dev/null; then
              echo "frontend production ok"
              exit 0
            fi
            sleep 10
          done
          echo "frontend production check failed (Vercel conserva deploy previo estable)"
          exit 1
