name: CI CD VPS

concurrency:
  group: backend-main-deploy
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/backend

      - name: Typecheck backend
        run: bunx tsc --noEmit
        working-directory: apps/backend

      - name: Run backend smoke contract
        run: bash scripts/ci/smoke_backend_contract.sh

      - name: Enforce architecture contracts
        run: python3 scripts/ci/check_architecture_contracts.py

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Vulnerability scan (Trivy fs)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - quality
      - security
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            PROJECT_DIR=/srv/app
            cd "$PROJECT_DIR"

            PREVIOUS_COMMIT=$(git rev-parse HEAD)

            ensure_clean_repo() {
              if ! git diff --quiet || ! git diff --cached --quiet; then
                echo "[deploy] drift: tracked changes on VPS — resetting"
                git checkout -- .
              fi

              UNTRACKED=$(git ls-files --others --exclude-standard)
              if [ -n "$UNTRACKED" ]; then
                echo "[deploy] drift: untracked files on VPS — cleaning"
                git clean -fd
              fi
            }

            deploy_and_smoke() {
              ensure_clean_repo
              git fetch origin main
              git checkout main
              git pull --ff-only origin main
              docker compose up -d --build --remove-orphans

              echo "[deploy] running migrations..."
              if ! docker compose exec -T backend bun run migrate; then
                echo "[deploy] ERROR: migration failed — aborting deploy"
                return 1
              fi

              echo "[deploy] waiting for readiness..."
              for attempt in $(seq 1 40); do
                if curl -fsS "http://127.0.0.1/api/ready" >/dev/null 2>&1; then
                  echo "[deploy] ready after ${attempt} attempts"
                  break
                fi
                if [ "$attempt" -eq 40 ]; then
                  echo "[deploy] readiness timeout after 80s"
                  return 1
                fi
                sleep 2
              done

              # Public endpoint smoke checks (no auth required)
              curl -fsS "http://127.0.0.1/api/health" >/dev/null
              curl -fsS "http://127.0.0.1/api/config" >/dev/null
              curl -fsS "http://127.0.0.1/api/agents/health" >/dev/null

              # Tracking smoke (uses x-agent-token, not JWT)
              AGENT_TOKEN=$(grep -oP '(?<=AGENT_INGEST_TOKEN=).*' /srv/app/.env | head -1)
              agent_payload='{"agent_id":"deploy-smoke-agent","ts":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'","lat":-12.0464,"lng":-77.0428,"accuracy":8,"seq":1}'
              curl -fsS -H "Content-Type: application/json" -H "x-agent-token: ${AGENT_TOKEN}" -X POST "http://127.0.0.1/api/agents/location" --data "$agent_payload" >/dev/null

              test -x scripts/backup.sh
              docker compose ps
            }

            if ! deploy_and_smoke; then
              echo "[deploy] smoke checks failed, diagnosing..."
              docker compose ps || true
              docker compose logs --tail=40 backend || true
              docker compose logs --tail=20 nginx || true
              echo "[deploy] rolling back to $PREVIOUS_COMMIT"
              git reset --hard "$PREVIOUS_COMMIT"
              docker compose up -d --build --remove-orphans
              for attempt in $(seq 1 40); do
                if curl -fsS "http://127.0.0.1/api/ready" >/dev/null 2>&1; then
                  break
                fi
                if [ "$attempt" -eq 40 ]; then
                  echo "[deploy] rollback not healthy"
                fi
                sleep 2
              done
              exit 1
            fi

            echo "[deploy] deploy ok"
