<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      background: #111b21;
      color: #e9edef;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .hdr {
      background: #1f2c34;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #2a3942;
    }
    .hdr-title { font-weight: 700; font-size: 13px; flex: 1; }
    .hdr-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3a4a52;
      transition: background .3s;
    }
    .hdr-dot.on { background: #00a884; }

    /* ── Login ── */
    #view-login { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .inp {
      width: 100%; padding: 9px 11px; border-radius: 8px;
      background: #1f2c34; border: 1px solid #2a3942;
      color: #e9edef; font-size: 12px; outline: none;
    }
    .inp:focus { border-color: #00a884; }
    .btn {
      width: 100%; padding: 10px; border-radius: 8px; border: none;
      background: #00a884; color: #fff;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn:hover { background: #008f72; }
    .btn:disabled { opacity: .5; cursor: default; }
    .err {
      font-size: 11px; color: #ef5350;
      background: #2d0d0d; border-radius: 6px;
      padding: 7px 9px; display: none;
    }

    /* ── Dashboard ── */
    #view-dash { display: none; flex-direction: column; }
    .user-row {
      padding: 10px 14px;
      font-size: 11px; color: #8696a0;
      border-bottom: 1px solid #2a3942;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logout-btn {
      background: none; border: none; color: #8696a0;
      font-size: 11px; cursor: pointer;
    }
    .logout-btn:hover { color: #ef5350; }

    .counter-box {
      padding: 24px 14px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .counter-num {
      font-size: 56px; font-weight: 800; line-height: 1;
      color: #00a884;
    }
    .counter-lbl {
      font-size: 11px; color: #8696a0; text-transform: uppercase; letter-spacing: .6px;
    }

    .reset-btn {
      margin: 0 14px 14px;
      padding: 7px; border-radius: 8px; border: 1px solid #2a3942;
      background: none; color: #8696a0;
      font-size: 11px; cursor: pointer; width: calc(100% - 28px);
    }
    .reset-btn:hover { border-color: #ef5350; color: #ef5350; }

    .wa-status {
      padding: 8px 14px;
      font-size: 10px; color: #8696a0;
      border-top: 1px solid #2a3942;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="hdr">
    <span style="font-size:16px">💬</span>
    <span class="hdr-title">Goberna</span>
    <div class="hdr-dot" id="dot"></div>
  </div>

  <!-- LOGIN -->
  <div id="view-login">
    <input class="inp" id="inp-email"    type="email"    placeholder="email@goberna.pe" />
    <input class="inp" id="inp-password" type="password" placeholder="Contraseña" />
    <div class="err" id="err"></div>
    <button class="btn" id="btn-login">Entrar</button>
  </div>

  <!-- DASHBOARD -->
  <div id="view-dash">
    <div class="user-row">
      <span id="user-name">—</span>
      <button class="logout-btn" id="btn-logout">Salir</button>
    </div>
    <div class="counter-box">
      <div class="counter-num" id="counter">0</div>
      <div class="counter-lbl">mensajes enviados</div>
    </div>
    <button class="reset-btn" id="btn-reset">Reiniciar contador</button>
    <div class="wa-status" id="wa-status">Abre WhatsApp Web para empezar</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
