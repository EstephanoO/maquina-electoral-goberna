<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      background: #111b21;
      color: #e9edef;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .hdr {
      background: #1f2c34;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #2a3942;
    }
    .hdr-title { font-weight: 700; font-size: 13px; flex: 1; }
    .hdr-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3a4a52;
      transition: background .3s;
    }
    .hdr-dot.on { background: #00a884; }

    /* ── Login ── */
    #view-login { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .inp {
      width: 100%; padding: 9px 11px; border-radius: 8px;
      background: #1f2c34; border: 1px solid #2a3942;
      color: #e9edef; font-size: 12px; outline: none;
    }
    .inp:focus { border-color: #00a884; }
    .btn {
      width: 100%; padding: 10px; border-radius: 8px; border: none;
      background: #00a884; color: #fff;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn:hover { background: #008f72; }
    .btn:disabled { opacity: .5; cursor: default; }
    .err {
      font-size: 11px; color: #ef5350;
      background: #2d0d0d; border-radius: 6px;
      padding: 7px 9px; display: none;
    }

    /* ── Dashboard ── */
    #view-dash { display: none; flex-direction: column; }
    .user-row {
      padding: 10px 14px;
      font-size: 11px; color: #8696a0;
      border-bottom: 1px solid #2a3942;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logout-btn {
      background: none; border: none; color: #8696a0;
      font-size: 11px; cursor: pointer;
    }
    .logout-btn:hover { color: #ef5350; }

    .counter-box {
      padding: 20px 14px 16px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .counter-num {
      font-size: 56px; font-weight: 800; line-height: 1;
      color: #00a884;
    }
    .counter-lbl {
      font-size: 11px; color: #8696a0; text-transform: uppercase; letter-spacing: .6px;
    }

    /* ── Número propio ── */
    .phone-section {
      margin: 0 14px 12px;
      padding: 10px 12px;
      background: #1f2c34;
      border-radius: 8px;
      border: 1px solid #2a3942;
    }
    .phone-label {
      font-size: 10px; color: #8696a0;
      text-transform: uppercase; letter-spacing: .6px;
      margin-bottom: 6px;
    }
    /* Estado: mostrando número guardado */
    .phone-display {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .phone-value {
      font-size: 13px; font-weight: 700; color: #00a884; flex: 1;
    }
    .phone-edit-btn {
      background: none; border: none; color: #8696a0;
      font-size: 10px; cursor: pointer; padding: 2px 4px;
      border-radius: 4px;
    }
    .phone-edit-btn:hover { color: #e9edef; background: #2a3942; }
    /* Estado: editando */
    .phone-edit {
      display: none;
      flex-direction: column; gap: 6px;
    }
    .phone-hint {
      font-size: 10px; color: #8696a0; margin-top: 2px;
    }
    .phone-save-btn {
      padding: 6px 10px; border-radius: 6px; border: none;
      background: #00a884; color: #fff;
      font-size: 11px; font-weight: 700; cursor: pointer;
      align-self: flex-end;
    }
    .phone-save-btn:hover { background: #008f72; }
    /* Sin número configurado */
    .phone-missing {
      font-size: 11px; color: #f0ad4e;
    }

    .reset-btn {
      margin: 0 14px 14px;
      padding: 7px; border-radius: 8px; border: 1px solid #2a3942;
      background: none; color: #8696a0;
      font-size: 11px; cursor: pointer; width: calc(100% - 28px);
    }
    .reset-btn:hover { border-color: #ef5350; color: #ef5350; }

    .wa-status {
      padding: 8px 14px;
      font-size: 10px; color: #8696a0;
      border-top: 1px solid #2a3942;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="hdr">
    <span style="font-size:16px">💬</span>
    <span class="hdr-title">Goberna</span>
    <div class="hdr-dot" id="dot"></div>
  </div>

  <!-- LOGIN -->
  <div id="view-login">
    <input class="inp" id="inp-email"    type="email"    placeholder="email@goberna.pe" />
    <input class="inp" id="inp-password" type="password" placeholder="Contraseña" />
    <div class="err" id="err"></div>
    <button class="btn" id="btn-login">Entrar</button>
  </div>

  <!-- DASHBOARD -->
  <div id="view-dash">
    <div class="user-row">
      <span id="user-name">—</span>
      <button class="logout-btn" id="btn-logout">Salir</button>
    </div>

    <div class="counter-box">
      <div class="counter-num" id="counter">0</div>
      <div class="counter-lbl">mensajes enviados</div>
    </div>

    <!-- Número WA propio -->
    <div class="phone-section">
      <div class="phone-label">Tu número WhatsApp</div>

      <!-- Sin número -->
      <div id="phone-missing">
        <div class="phone-missing">⚠ Sin número configurado</div>
        <div class="phone-hint" style="margin-top:4px">Los envíos no se registrarán hasta que lo configures.</div>
      </div>

      <!-- Número guardado -->
      <div class="phone-display" id="phone-display" style="display:none">
        <span class="phone-value" id="phone-value">—</span>
        <button class="phone-edit-btn" id="btn-phone-edit">Cambiar</button>
      </div>

      <!-- Formulario de edición -->
      <div class="phone-edit" id="phone-edit">
        <input class="inp" id="inp-phone" type="tel" placeholder="51987654321" style="font-size:12px" />
        <div class="phone-hint">Solo dígitos, con código de país (ej: 51987654321)</div>
        <button class="phone-save-btn" id="btn-phone-save">Guardar</button>
      </div>
    </div>

    <button class="reset-btn" id="btn-reset">Reiniciar contador</button>
    <div class="wa-status" id="wa-status">Abre WhatsApp Web para empezar</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
