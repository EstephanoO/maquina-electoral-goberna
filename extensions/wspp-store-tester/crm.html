<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Goberna CRM — WhatsApp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Goberna brand */
      --blue:      #163960;
      --blue-hi:   #1e4d7e;
      --blue-lt:   #2a6299;
      --blue-dk:   #0e2540;
      --gold:      #FFC800;
      --gold-dim:  #8a6e00;
      --gold-bg:   #1e1800;
      /* Surfaces */
      --bg:        #0d1b26;
      --surface:   #122030;
      --surface2:  #192c3e;
      --surface3:  #1e3348;
      --border:    #1c3350;
      --border-hi: #2a4a6a;
      /* Text */
      --text:      #e8eef4;
      --text-sub:  #7a9bb5;
      --text-mute: #4a6a85;
      /* Status */
      --green:     #22c78a;
      --orange:    #f5a623;
      --red:       #e8534a;
      /* Chat */
      --mine-bg:   #0d3026;
      --their-bg:  #192c3e;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg); color: var(--text); font-size: 14px;
      overflow: hidden;
    }

    /* ── Layout ────────────────────────────────────────────────── */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ───────────────────────────────────────────────── */
    .sidebar {
      width: 340px; min-width: 280px; max-width: 380px;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }

    /* Header */
    .sidebar-header {
      padding: 14px 16px; display: flex; align-items: center; gap: 10px;
      background: var(--blue); flex-shrink: 0;
    }
    .me-avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: var(--gold); display: flex; align-items: center;
      justify-content: center; font-weight: 800; font-size: 15px; color: #0f1a0f;
    }
    .header-name { font-weight: 700; font-size: 14px; color: var(--text); }
    .header-sub  { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 1px; }
    .header-logo {
      margin-left: auto; font-size: 11px; font-weight: 800;
      letter-spacing: 2px; color: var(--gold); flex-shrink: 0;
    }
    .conn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); flex-shrink: 0; margin-left: 4px;
    }
    .conn-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* Search */
    .search-bar {
      padding: 8px 12px; background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 12px; opacity: .4; pointer-events: none; }
    .search-bar input {
      width: 100%; padding: 7px 9px 7px 28px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 12px; outline: none;
      transition: border-color .15s;
    }
    .search-bar input:focus { border-color: var(--gold); }
    .search-bar input::placeholder { color: var(--text-mute); }

    /* Tabs */
    .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab {
      flex: 1; padding: 10px 4px; text-align: center; font-size: 10px; font-weight: 700;
      color: var(--text-sub); cursor: pointer; border-bottom: 2px solid transparent;
      text-transform: uppercase; letter-spacing: .5px; transition: all .15s;
    }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab:hover:not(.active) { color: var(--text); }
    .tab-badge {
      display: inline-block; background: var(--red); color: #fff;
      border-radius: 99px; font-size: 9px; padding: 1px 4px;
      margin-left: 3px; vertical-align: middle;
    }

    /* Chat list */
    .list-area { flex: 1; overflow-y: auto; }
    .list-area::-webkit-scrollbar { width: 3px; }
    .list-area::-webkit-scrollbar-thumb { background: var(--surface3); }

    .chat-item {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 14px; cursor: pointer;
      border-bottom: 1px solid var(--border); transition: background .1s;
    }
    .chat-item:hover  { background: var(--surface); }
    .chat-item.active { background: var(--surface2); border-left: 3px solid var(--gold); }

    .avatar {
      width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
      background: var(--surface2); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 17px; color: var(--text-sub);
    }
    .avatar.group  { background: var(--blue-dk); color: var(--gold); border-color: var(--blue); font-size: 20px; }
    .avatar.unread { border-color: var(--gold); }

    .chat-info { flex: 1; min-width: 0; }
    .chat-name {
      font-weight: 600; font-size: 13px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-preview {
      font-size: 11px; color: var(--text-sub);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;
    }
    .chat-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .chat-time { font-size: 10px; color: var(--text-mute); }
    .unread-badge {
      background: var(--gold); color: #0f1a0f; font-size: 10px; font-weight: 800;
      border-radius: 9999px; padding: 1px 6px; min-width: 20px; text-align: center;
    }

    /* Contact item */
    .contact-item {
      display: flex; align-items: center; gap: 11px;
      padding: 9px 14px; border-bottom: 1px solid var(--border);
      cursor: default; transition: background .1s;
    }
    .contact-item:hover { background: var(--surface); }
    .contact-name { font-weight: 500; font-size: 12px; }
    .contact-id   { font-size: 10px; color: var(--text-sub); font-family: monospace; }

    /* ── Main panel ─────────────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* Chat header */
    .chat-header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: var(--blue); flex-shrink: 0;
    }
    .chat-header .info { flex: 1; min-width: 0; }
    .chat-header .chat-name { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-header .chat-sub  { font-size: 11px; color: rgba(255,255,255,.5); }

    /* Stats bar */
    .stats-bar {
      display: flex; gap: 6px; padding: 7px 14px;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
      flex-wrap: wrap;
    }
    .stat-pill {
      background: var(--surface2); border-radius: 6px;
      padding: 4px 10px; font-size: 11px; color: var(--text-sub);
      border: 1px solid var(--border);
    }
    .stat-pill span { color: var(--text); font-weight: 700; }

    /* Messages */
    .messages {
      flex: 1; overflow-y: auto; padding: 14px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--surface3); }

    .msg-bubble {
      max-width: 72%; padding: 8px 12px; border-radius: 10px;
      font-size: 13px; line-height: 1.45; word-break: break-word;
    }
    .msg-bubble.mine  { background: var(--mine-bg); align-self: flex-end; border-bottom-right-radius: 3px; }
    .msg-bubble.their { background: var(--their-bg); align-self: flex-start; border-bottom-left-radius: 3px; }
    .msg-time { font-size: 10px; color: var(--text-mute); margin-top: 3px; text-align: right; }
    .msg-from { font-size: 11px; color: var(--gold); font-weight: 600; margin-bottom: 3px; }

    /* Live badge */
    .live-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(34,199,138,.12); color: var(--green);
      font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 9999px;
      text-transform: uppercase; letter-spacing: .5px; flex-shrink: 0;
      border: 1px solid rgba(34,199,138,.25);
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Stats view ─────────────────────────────────────────────── */
    .stats-view {
      flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
    }
    .stats-view::-webkit-scrollbar { width: 3px; }
    .stats-view::-webkit-scrollbar-thumb { background: var(--surface3); }

    .stats-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .stats-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-card {
      background: var(--surface); border-radius: 10px; padding: 14px;
      display: flex; flex-direction: column; gap: 5px;
      border: 1px solid var(--border);
    }
    .stat-card-icon  { font-size: 20px; }
    .stat-card-val   { font-size: 24px; font-weight: 800; color: var(--text); }
    .stat-card-label { font-size: 11px; color: var(--text-sub); }

    .live-msg-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
    .live-msg-item {
      background: var(--surface); padding: 9px 12px; border-radius: 8px;
      border: 1px solid var(--border); border-left: 3px solid var(--green);
    }
    .live-msg-from { color: var(--gold); font-weight: 600; font-size: 11px; margin-bottom: 3px; }
    .live-msg-body { font-size: 12px; line-height: 1.4; }
    .live-msg-time { font-size: 10px; color: var(--text-mute); margin-top: 3px; }

    /* Section label */
    .section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px;
      color: var(--text-mute); padding: 4px 0;
    }

    /* Message body/type */
    .msg-body { word-break: break-word; }
    .msg-type {
      font-size: 10px; color: var(--text-mute); text-transform: uppercase;
      margin-bottom: 3px; letter-spacing: .4px;
    }

    /* Tab flash on new message */
    .tab.flash { color: var(--gold) !important; }

    /* ── Empty & loading ──────────────────────────────────────────*/
    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      color: var(--text-sub); text-align: center; padding: 40px;
    }
    .empty .icon  { font-size: 44px; opacity: .25; }
    .empty .title { font-size: 17px; font-weight: 700; color: var(--text); }
    .empty .sub   { font-size: 13px; }

    .loading { display: flex; align-items: center; justify-content: center; flex: 1; padding: 40px; }
    .spinner {
      width: 30px; height: 30px; border: 3px solid var(--surface3);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Scrollbar global ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="me-avatar" id="me-avatar">?</div>
        <div>
          <div class="header-name" id="me-name">Conectando...</div>
          <div class="header-sub" id="me-platform">WhatsApp Web</div>
        </div>
        <div class="header-logo">GOBERNA</div>
        <div class="conn-dot" id="conn-dot"></div>
      </div>

      <div class="search-bar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Buscar chats o contactos..." />
        </div>
      </div>

      <div class="tabs" id="tab-bar">
        <div class="tab active" data-tab="chats">Chats</div>
        <div class="tab" data-tab="contacts">Contactos</div>
        <div class="tab" data-tab="stats">Stats</div>
      </div>

      <div class="list-area" id="list-area">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main" id="main-panel">
      <div class="empty">
        <div class="icon">◆</div>
        <div class="title">Goberna CRM</div>
        <div class="sub">Selecciona un chat para ver sus mensajes</div>
      </div>
    </main>
  </div>

  <script src="crm.js"></script>
</body>
</html>
