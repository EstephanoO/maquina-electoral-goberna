<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
    }
    .version {
      font-size: 10px;
      color: #999;
      font-weight: 400;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: white;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .status-dot.active { background: #25d366; }
    .status-text {
      font-size: 12px;
      color: #666;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #008069;
      color: white;
    }
    .btn-primary:hover:not(:disabled) { background: #006c56; }
    .info {
      margin-top: 12px;
      padding: 10px;
      background: #e8f5e9;
      border-radius: 8px;
      font-size: 11px;
      color: #2e7d32;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#008069">
        <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM10 17L5 12L6.41 10.59L10 14.17L17.59 6.58L19 8L10 17Z"/>
      </svg>
      <h1>WhatsApp Goberna</h1>
    </div>
    <span class="version" id="version"></span>
  </div>

  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Verificando...</span>
  </div>

  <button class="btn btn-primary" id="openWa">Abrir WhatsApp</button>

  <div class="info">
    Los links de WhatsApp en el dashboard se abren automaticamente en una sola pestana.
    Los mensajes enviados se detectan y sincronizan con el CMS.
  </div>

  <script src="popup.js"></script>
</body>
</html>
