<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
    }
    h1 {
      font-size: 14px;
      color: #1a1a1a;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: white;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
    }
    .status-dot.active { background: #25d366; }
    .status-text { font-size: 12px; color: #666; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary {
      background: #008069;
      color: white;
    }
    .btn-primary:hover { background: #006c56; }
    .btn-secondary {
      background: white;
      color: #008069;
      border: 1px solid #008069;
      margin-top: 8px;
    }
    .info {
      margin-top: 12px;
      padding: 10px;
      background: #fff3cd;
      border-radius: 8px;
      font-size: 11px;
      color: #856404;
    }
  </style>
</head>
<body>
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="#008069">
      <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM10 17L5 12L6.41 10.59L10 14.17L17.59 6.58L19 8L10 17Z"/>
    </svg>
    WhatsApp Goberna
  </h1>
  
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Verificando...</span>
  </div>

  <button class="btn btn-primary" id="openWa">Abrir WhatsApp</button>
  <button class="btn btn-secondary" id="testEvent">Probar evento</button>

  <div class="info">
    💡 Los eventos se envían automáticamente cuando detectas palabras clave en los mensajes entrantes.
  </div>

  <script src="popup.js"></script>
</body>
</html>
