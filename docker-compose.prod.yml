name: ${APP_NAME:-maquina_electoral}

services:
  redis:
    image: redis:7.4-alpine
    container_name: ${APP_NAME:-maquina_electoral}_redis
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--save", "900", "1", "--save", "300", "10", "--save", "60", "10000", "--maxmemory", "512mb", "--maxmemory-policy", "noeviction", "--loglevel", "warning", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nexus_app_network

  tegola:
    image: gospatial/tegola:latest
    container_name: ${APP_NAME:-maquina_electoral}_tegola
    restart: always
    depends_on:
      - redis
    command: ["serve", "--config", "/etc/tegola/config.toml"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./tegola/config.toml:/etc/tegola/config.toml:ro
    networks:
      - nexus_app_network

  backend:
    build:
      context: ${BACKEND_CONTEXT:-./apps/backend}
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
    container_name: ${APP_NAME:-maquina_electoral}_backend
    restart: always
    depends_on:
      tegola:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: ${BACKEND_PORT}
      TEGOLA_BASE_URL: http://tegola:8080
      TEGOLA_MAP: ${TEGOLA_MAP:-peru}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-5000}
      UPSTREAM_RETRIES: ${UPSTREAM_RETRIES:-2}
      WHATSAPP_BOT_URL: ${WHATSAPP_BOT_URL:-http://leads_crm_bot:4020}
      WHATSAPP_BOT_INSTANCE: ${WHATSAPP_BOT_INSTANCE:-peru2}
      BOT_SHARED_SECRET: ${BOT_SHARED_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_MAX_PER_MINUTE: ${RATE_LIMIT_MAX_PER_MINUTE:-500000}
      RATE_LIMIT_FORMS_PER_MINUTE: ${RATE_LIMIT_FORMS_PER_MINUTE:-1200}
      RATE_LIMIT_AGENTS_LOCATION_PER_MINUTE: ${RATE_LIMIT_AGENTS_LOCATION_PER_MINUTE:-12000}
      RATE_LIMIT_AGENTS_LIVE_PER_MINUTE: ${RATE_LIMIT_AGENTS_LIVE_PER_MINUTE:-3000}
      RATE_LIMIT_AGENTS_STREAM_PER_MINUTE: ${RATE_LIMIT_AGENTS_STREAM_PER_MINUTE:-500}
      FORMS_BATCH_REQUEST_LIMIT: ${FORMS_BATCH_REQUEST_LIMIT:-200}
      FORMS_WB_BATCH_SIZE: ${FORMS_WB_BATCH_SIZE:-200}
      FORMS_WB_FLUSH_MS: ${FORMS_WB_FLUSH_MS:-300}
      FORMS_WB_MAX_QUEUE: ${FORMS_WB_MAX_QUEUE:-10000}
      TZ: ${TZ}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-365d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-365d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      AGENT_INGEST_TOKEN: ${AGENT_INGEST_TOKEN}
      AGENT_STALE_AFTER_MS: ${AGENT_STALE_AFTER_MS:-120000}
      AGENT_STREAM_HEARTBEAT_MS: ${AGENT_STREAM_HEARTBEAT_MS:-25000}
      TRACKING_WB_BATCH_SIZE: ${TRACKING_WB_BATCH_SIZE:-300}
      TRACKING_WB_FLUSH_MS: ${TRACKING_WB_FLUSH_MS:-250}
      TRACKING_WB_MAX_QUEUE: ${TRACKING_WB_MAX_QUEUE:-10000}
      DB_POOL_MAX: ${DB_POOL_MAX:-30}
      DB_IDLE_TIMEOUT_MS: ${DB_IDLE_TIMEOUT_MS:-30000}
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-5000}
      DB_SSL_MODE: ${DB_SSL_MODE:-auto}
      TRACKING_STREAM_KEY: ${TRACKING_STREAM_KEY:-tracking:events}
      TRACKING_STREAM_GROUP: ${TRACKING_STREAM_GROUP:-tracking-workers}
      TRACKING_SEQ_HASH_KEY: ${TRACKING_SEQ_HASH_KEY:-tracking:last-seq}
      TRACKING_STREAM_MAX_LEN: ${TRACKING_STREAM_MAX_LEN:-200000}
      FORMS_STREAM_KEY: ${FORMS_STREAM_KEY:-forms:events}
      FORMS_STREAM_GROUP: ${FORMS_STREAM_GROUP:-forms-workers}
      FORMS_STREAM_MAX_LEN: ${FORMS_STREAM_MAX_LEN:-200000}
      FORMS_DEDUPE_PREFIX: ${FORMS_DEDUPE_PREFIX:-forms:dedupe:}
      FORMS_DEDUPE_TTL_SEC: ${FORMS_DEDUPE_TTL_SEC:-604800}
      STREAM_CONSUMER_BLOCK_MS: ${STREAM_CONSUMER_BLOCK_MS:-500}
      STREAM_CLAIM_IDLE_MS: ${STREAM_CLAIM_IDLE_MS:-30000}
      STREAM_CLAIM_BATCH_SIZE: ${STREAM_CLAIM_BATCH_SIZE:-200}
      STREAM_DLQ_MAX_ATTEMPTS: ${STREAM_DLQ_MAX_ATTEMPTS:-5}
      TRACKING_DLQ_STREAM_KEY: ${TRACKING_DLQ_STREAM_KEY:-tracking:dlq}
      FORMS_DLQ_STREAM_KEY: ${FORMS_DLQ_STREAM_KEY:-forms:dlq}
      RATE_LIMIT_FORMS_IP_PER_MINUTE: ${RATE_LIMIT_FORMS_IP_PER_MINUTE:-12000}
      RATE_LIMIT_FORMS_WINDOW_SEC: ${RATE_LIMIT_FORMS_WINDOW_SEC:-60}
      AGENT_STREAM_BATCH_FLUSH_MS: ${AGENT_STREAM_BATCH_FLUSH_MS:-120}
      UPLOADS_DIR: /srv/uploads
    volumes:
      - uploads:/srv/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:${BACKEND_PORT}/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - nexus_app_network
      - leads-crm_internal

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-maquina_electoral}_frontend
    restart: always
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: https://electoral.goberna.club
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3001 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - nexus_app_network

  nginx:
    image: nginx:1.27-alpine
    container_name: ${APP_NAME:-maquina_electoral}_nginx
    restart: always
    depends_on:
      - backend
      - frontend
    environment:
      API_DOMAIN: ${API_DOMAIN}
      BACKEND_PORT: ${BACKEND_PORT}
      NGINX_TEMPLATE: ${NGINX_TEMPLATE:-default.http.conf.template}
    ports:
      - "0.0.0.0:7050:80"
    entrypoint: /etc/nginx/entrypoint.sh
    volumes:
      - uploads:/srv/uploads:ro
      - ./nginx:/etc/nginx/templates
      - ./nginx/entrypoint.sh:/etc/nginx/entrypoint.sh:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - nexus_app_network

networks:
  nexus_app_network:
    external: true
  leads-crm_internal:
    external: true

volumes:
  redis-data:
  uploads:
